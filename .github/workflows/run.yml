name: Generate XML Feed

permissions:
  contents: write

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: xml-feed
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Save credentials
        run: |
          printf '%s' '${{ secrets.GOOGLE_CREDS }}' > credentials.json

      - name: Set credentials env
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=credentials.json" >> $GITHUB_ENV

      - name: Run script
        run: python generate_xml.py

      - name: Commit and Push XML (force-safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add feed.xml

          # Commit only if there are changes
          git diff --cached --quiet || git commit -m "Update XML"

          # Force-safe push (prevents fetch/rebase errors)
          git push origin HEAD:main --force-with-lease
