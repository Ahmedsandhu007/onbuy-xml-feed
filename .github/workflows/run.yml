name: Generate XML Feed

permissions:
  contents: write

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Save credentials
        run: |
          printf '%s' '${{ secrets.GOOGLE_CREDS }}' > credentials.json

      - name: Set credentials env
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=credentials.json" >> $GITHUB_ENV

      - name: Run script
        run: python generate_xml.py

      - name: Commit XML
        run: |
         git config --global user.name "bot"
         git config --global user.email "bot@example.com"
         git add feed.xml
         git commit -m "Update XML" || echo "No changes"
         git pull --rebase
         git push
